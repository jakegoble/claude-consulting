<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Contacts Mockup — Laptop + Phone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1440px;
    height: 900px;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }

  .scene {
    position: relative;
    width: 1440px;
    height: 900px;
  }

  .ambient-glow {
    position: absolute;
    width: 1000px;
    height: 600px;
    top: 45%;
    left: 45%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(242, 87, 73, 0.03) 0%, transparent 65%);
    pointer-events: none;
  }

  /* ====== MacBook Pro (positioned left) ====== */
  .macbook {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-52%);
    z-index: 1;
  }

  .macbook-lid {
    position: relative;
    width: 900px;
    padding: 12px 12px 12px 12px;
    background: linear-gradient(180deg,
      #2d2d32 0%, #1f1f24 3%, #27272c 50%, #1f1f24 97%, #36363c 100%
    );
    border-radius: 14px 14px 0 0;
    box-shadow:
      0 -1px 0 0 rgba(255,255,255,0.08),
      0 40px 80px -15px rgba(0,0,0,0.65),
      0 20px 40px -5px rgba(0,0,0,0.45),
      inset 1px 0 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 0 rgba(255,255,255,0.06),
      inset 0 1px 0 0 rgba(255,255,255,0.1);
  }

  .macbook-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 20px;
    background: linear-gradient(180deg, #1a1a1f, #18181d);
    border-radius: 0 0 10px 10px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #3a3a45, #1a1a22);
    box-shadow: inset 0 0 2px rgba(80, 120, 180, 0.3);
    margin-top: 2px;
  }

  .macbook-screen-bezel {
    background: #000;
    border-radius: 7px;
    padding: 2px;
    position: relative;
    overflow: hidden;
  }

  .macbook-screen-bezel img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 5px;
  }

  .screen-reflection {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 5px;
    background: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.01) 100%);
    pointer-events: none;
    z-index: 5;
  }

  .macbook-base {
    width: 940px;
    height: 9px;
    margin: 0 auto;
    background: linear-gradient(180deg, #36363c 0%, #2a2a30 30%, #222228 70%, #1c1c22 100%);
    border-radius: 0 0 4px 4px;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .macbook-base::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 3px;
    background: linear-gradient(180deg, #18181d, #222228);
    border-radius: 0 0 6px 6px;
  }

  .laptop-surface {
    width: 900px;
    height: 60px;
    margin: 0 auto;
    background: linear-gradient(180deg, rgba(30, 30, 38, 0.35), transparent);
    mask: linear-gradient(180deg, rgba(0,0,0,0.25), transparent);
    -webkit-mask: linear-gradient(180deg, rgba(0,0,0,0.25), transparent);
    border-radius: 0 0 16px 16px;
    filter: blur(2px);
  }

  /* ====== iPhone 15 Pro (positioned right) ====== */
  .iphone {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-48%) rotate(6deg);
    z-index: 5;
  }

  .iphone-body {
    width: 260px;
    height: 540px;
    background: linear-gradient(180deg,
      #1c1c1e 0%,
      #2c2c2e 2%,
      #1a1a1c 50%,
      #2c2c2e 98%,
      #1c1c1e 100%
    );
    border-radius: 42px;
    padding: 10px;
    position: relative;
    box-shadow:
      /* titanium edge highlights */
      inset 0 0 0 1px rgba(255,255,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.12),
      /* deep shadow */
      0 40px 80px -10px rgba(0,0,0,0.7),
      0 20px 40px rgba(0,0,0,0.4),
      0 5px 15px rgba(0,0,0,0.3),
      /* right edge - catches light */
      2px 0 0 rgba(255,255,255,0.04);
  }

  /* Side buttons */
  .iphone-body::before {
    content: '';
    position: absolute;
    right: -2px;
    top: 120px;
    width: 3px;
    height: 50px;
    background: linear-gradient(90deg, #2a2a2e, #3a3a40, #2a2a2e);
    border-radius: 0 2px 2px 0;
  }

  .iphone-body::after {
    content: '';
    position: absolute;
    left: -2px;
    top: 100px;
    width: 3px;
    height: 30px;
    background: linear-gradient(90deg, #2a2a2e, #3a3a40, #2a2a2e);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 45px 0 #2a2a2e;
  }

  .iphone-screen-bezel {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 34px;
    overflow: hidden;
    position: relative;
  }

  .iphone-screen-bezel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left top;
    display: block;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 26px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
  }

  .iphone-screen-reflection {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 34px;
    background: linear-gradient(140deg, rgba(255,255,255,0.04) 0%, transparent 35%, transparent 65%, rgba(255,255,255,0.02) 100%);
    pointer-events: none;
    z-index: 6;
  }

  /* Phone shadow on surface */
  .iphone-shadow {
    position: absolute;
    right: 90px;
    bottom: 100px;
    width: 200px;
    height: 80px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
    transform: rotate(6deg);
    filter: blur(20px);
    z-index: 0;
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="ambient-glow"></div>

    <div class="macbook">
      <div class="macbook-lid">
        <div class="macbook-notch"><div class="camera-dot"></div></div>
        <div class="macbook-screen-bezel">
          <img src="/images/raw/madrone_contacts.png" alt="Contacts">
          <div class="screen-reflection"></div>
        </div>
      </div>
      <div class="macbook-base"></div>
      <div class="laptop-surface"></div>
    </div>

    <div class="iphone-shadow"></div>
    <div class="iphone">
      <div class="iphone-body">
        <div class="iphone-screen-bezel">
          <div class="dynamic-island"></div>
          <img src="/images/raw/madrone_contacts.png" alt="Contacts Mobile">
          <div class="iphone-screen-reflection"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
