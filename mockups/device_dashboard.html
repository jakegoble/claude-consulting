<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Dashboard Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1440px;
    height: 900px;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }

  /* Subtle ambient glow behind the laptop */
  .ambient-glow {
    position: absolute;
    width: 900px;
    height: 500px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -45%);
    background: radial-gradient(ellipse, rgba(242, 87, 73, 0.04) 0%, rgba(242, 87, 73, 0.02) 30%, transparent 70%);
    pointer-events: none;
  }

  /* ====== MacBook Pro Frame ====== */
  .macbook {
    position: relative;
    z-index: 1;
  }

  .macbook-lid {
    position: relative;
    width: 1100px;
    padding: 14px 14px 14px 14px;
    background: linear-gradient(180deg,
      #2d2d32 0%,
      #1f1f24 3%,
      #27272c 50%,
      #1f1f24 97%,
      #36363c 100%
    );
    border-radius: 16px 16px 0 0;
    /* Metallic edge highlights */
    box-shadow:
      /* outer glow/shadow */
      0 -1px 0 0 rgba(255,255,255,0.08),
      0 50px 100px -20px rgba(0,0,0,0.7),
      0 30px 60px -10px rgba(0,0,0,0.5),
      0 10px 20px rgba(0,0,0,0.3),
      /* left/right edge highlights */
      inset 1px 0 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 0 rgba(255,255,255,0.06),
      /* top edge highlight */
      inset 0 1px 0 0 rgba(255,255,255,0.1);
  }

  /* Camera notch area */
  .macbook-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 24px;
    background: linear-gradient(180deg, #1a1a1f 0%, #18181d 100%);
    border-radius: 0 0 12px 12px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #3a3a45 0%, #1a1a22 80%);
    box-shadow: inset 0 0 2px rgba(80, 120, 180, 0.3);
    margin-top: 2px;
  }

  /* Screen bezel (thin dark border around screen) */
  .macbook-screen-bezel {
    background: #000;
    border-radius: 8px;
    padding: 2px;
    position: relative;
    overflow: hidden;
  }

  .macbook-screen-bezel img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 6px;
  }

  /* Glass reflection overlay */
  .screen-reflection {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 6px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.03) 0%,
      transparent 40%,
      transparent 60%,
      rgba(255,255,255,0.015) 100%
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Bottom hinge */
  .macbook-base {
    width: 1140px;
    height: 10px;
    margin: 0 auto;
    background: linear-gradient(180deg,
      #36363c 0%,
      #2a2a30 30%,
      #222228 70%,
      #1c1c22 100%
    );
    border-radius: 0 0 4px 4px;
    position: relative;
    box-shadow:
      0 2px 8px rgba(0,0,0,0.4),
      0 1px 0 0 rgba(255,255,255,0.05),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* Indent notch on the hinge (for opening) */
  .macbook-base::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: linear-gradient(180deg, #18181d, #222228);
    border-radius: 0 0 8px 8px;
  }

  /* Surface reflection below laptop */
  .surface-reflection {
    width: 1100px;
    height: 80px;
    margin: 0 auto;
    background: linear-gradient(180deg,
      rgba(30, 30, 38, 0.4) 0%,
      rgba(10, 10, 15, 0) 100%
    );
    mask: linear-gradient(180deg, rgba(0,0,0,0.3), transparent);
    -webkit-mask: linear-gradient(180deg, rgba(0,0,0,0.3), transparent);
    border-radius: 0 0 20px 20px;
    filter: blur(2px);
  }
</style>
</head>
<body>
  <div class="ambient-glow"></div>
  <div class="macbook">
    <div class="macbook-lid">
      <div class="macbook-notch">
        <div class="camera-dot"></div>
      </div>
      <div class="macbook-screen-bezel">
        <img src="/images/raw/madrone_dashboard.png" alt="Dashboard">
        <div class="screen-reflection"></div>
      </div>
    </div>
    <div class="macbook-base"></div>
    <div class="surface-reflection"></div>
  </div>
</body>
</html>
