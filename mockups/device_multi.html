<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Multi-Device Overview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1440px;
    height: 900px;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  }

  .scene {
    position: relative;
    width: 1440px;
    height: 900px;
  }

  .ambient-glow {
    position: absolute;
    width: 1200px;
    height: 700px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(242, 87, 73, 0.025) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ====== Shared MacBook styles ====== */
  .macbook-lid {
    position: relative;
    padding: 10px;
    background: linear-gradient(180deg,
      #2d2d32 0%, #1f1f24 3%, #27272c 50%, #1f1f24 97%, #36363c 100%
    );
    border-radius: 12px 12px 0 0;
    box-shadow:
      0 -1px 0 0 rgba(255,255,255,0.07),
      0 30px 60px -10px rgba(0,0,0,0.6),
      0 15px 30px rgba(0,0,0,0.4),
      inset 1px 0 0 0 rgba(255,255,255,0.05),
      inset -1px 0 0 0 rgba(255,255,255,0.05),
      inset 0 1px 0 0 rgba(255,255,255,0.09);
  }

  .macbook-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 16px;
    background: linear-gradient(180deg, #1a1a1f, #18181d);
    border-radius: 0 0 8px 8px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .camera-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #3a3a45, #1a1a22);
    margin-top: 1px;
  }

  .macbook-screen-bezel {
    background: #000;
    border-radius: 5px;
    padding: 1px;
    position: relative;
    overflow: hidden;
  }

  .macbook-screen-bezel img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 4px;
  }

  .screen-reflection {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.01) 100%);
    pointer-events: none;
    z-index: 5;
  }

  .macbook-base {
    height: 7px;
    margin: 0 auto;
    background: linear-gradient(180deg, #36363c, #222228);
    border-radius: 0 0 3px 3px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ====== Three device layout ====== */

  /* Back-left device */
  .device-left {
    position: absolute;
    left: 20px;
    top: 140px;
    z-index: 1;
    transform: perspective(1200px) rotateY(8deg) scale(0.85);
    transform-origin: center center;
    opacity: 0.88;
  }
  .device-left .macbook-lid { width: 660px; }
  .device-left .macbook-base { width: 700px; }

  /* Center device (hero) */
  .device-center {
    position: absolute;
    left: 50%;
    top: 100px;
    transform: translateX(-50%);
    z-index: 3;
  }
  .device-center .macbook-lid { width: 750px; }
  .device-center .macbook-base { width: 790px; }

  /* Back-right device */
  .device-right {
    position: absolute;
    right: 20px;
    top: 140px;
    z-index: 1;
    transform: perspective(1200px) rotateY(-8deg) scale(0.85);
    transform-origin: center center;
    opacity: 0.88;
  }
  .device-right .macbook-lid { width: 660px; }
  .device-right .macbook-base { width: 700px; }

  /* Surface shadows for each device */
  .device-shadow {
    position: absolute;
    height: 40px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
    filter: blur(15px);
    z-index: 0;
  }
  .shadow-left {
    left: 40px;
    bottom: 155px;
    width: 620px;
    transform: perspective(1200px) rotateY(8deg);
  }
  .shadow-center {
    left: 50%;
    bottom: 130px;
    transform: translateX(-50%);
    width: 720px;
    z-index: 2;
  }
  .shadow-right {
    right: 40px;
    bottom: 155px;
    width: 620px;
    transform: perspective(1200px) rotateY(-8deg);
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="ambient-glow"></div>

    <!-- Shadows first -->
    <div class="device-shadow shadow-left"></div>
    <div class="device-shadow shadow-center"></div>
    <div class="device-shadow shadow-right"></div>

    <!-- Left device - Dashboard -->
    <div class="device-left">
      <div class="macbook-lid">
        <div class="macbook-notch"><div class="camera-dot"></div></div>
        <div class="macbook-screen-bezel">
          <img src="/images/raw/madrone_dashboard.png" alt="Dashboard">
          <div class="screen-reflection"></div>
        </div>
      </div>
      <div class="macbook-base"></div>
    </div>

    <!-- Center device - Contacts (hero) -->
    <div class="device-center">
      <div class="macbook-lid">
        <div class="macbook-notch"><div class="camera-dot"></div></div>
        <div class="macbook-screen-bezel">
          <img src="/images/raw/madrone_contacts.png" alt="Contacts">
          <div class="screen-reflection"></div>
        </div>
      </div>
      <div class="macbook-base"></div>
    </div>

    <!-- Right device - Strategy -->
    <div class="device-right">
      <div class="macbook-lid">
        <div class="macbook-notch"><div class="camera-dot"></div></div>
        <div class="macbook-screen-bezel">
          <img src="/images/raw/madrone_strategy.png" alt="Strategy">
          <div class="screen-reflection"></div>
        </div>
      </div>
      <div class="macbook-base"></div>
    </div>
  </div>
</body>
</html>
